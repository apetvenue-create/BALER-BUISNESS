<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          // Mobile-only product: tablet and desktop variants stay disabled.
          screens: {
            sm: '9999px',
            md: '10000px',
            lg: '10001px',
            xl: '10002px',
            '2xl': '10003px'
          },
          extend: {
            colors: {
              primary: '#3b82f6',
            }
          }
        }
      }
    </script>
    <style>
      html {
        scrollbar-gutter: stable;
      }
      body {
        overflow-y: scroll;
        background: #e2e8f0;
      }
      html.hide-page-scrollbar,
      body.hide-page-scrollbar {
        scrollbar-width: none;
        -ms-overflow-style: none;
        scrollbar-gutter: auto;
      }
      html.hide-page-scrollbar::-webkit-scrollbar,
      body.hide-page-scrollbar::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }
      #root {
        width: 100%;
        max-width: 35rem;
        min-height: 100vh;
        margin: 0 auto;
        background: #f3f4f6;
        box-shadow: 0 0 40px rgba(15, 23, 42, 0.12);
      }
      /* Keep tab bars from flashing a scrollbar while switching */
      .tab-strip {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .tab-strip::-webkit-scrollbar {
        display: none;
      }
    </style>
</head>
  <body class="bg-gray-100 min-h-screen">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
